name: Build and Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-win:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.x'
    - run: dotnet restore
    - name: Download yt-dlp
      shell: pwsh
      run: |
        $release = Invoke-RestMethod "https://api.github.com/repos/yt-dlp/yt-dlp/releases/latest"
        $asset = $release.assets | Where-Object { $_.name -eq "yt-dlp.exe" }
        Invoke-WebRequest $asset.browser_download_url -OutFile "./yt-dlp-bin.exe"
    - run: dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=false -o ./publish/win-x64
    - name: Bundle yt-dlp
      shell: pwsh
      run: |
        $binDir = "./publish/win-x64/bin"
        New-Item -ItemType Directory -Force -Path $binDir
        Move-Item "./yt-dlp-bin.exe" "$binDir/yt-dlp.exe"
    - uses: actions/upload-artifact@v4
      with:
        name: publish-win-x64
        path: ./publish/win-x64

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.x'
    - run: dotnet restore
    - name: Download yt-dlp
      run: |
        curl -sL $(curl -s https://api.github.com/repos/yt-dlp/yt-dlp/releases/latest | grep -o 'https://[^"]*yt-dlp_linux"' | tr -d '"') -o yt-dlp-bin
        chmod +x yt-dlp-bin
    - run: dotnet publish -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=false -o ./publish/linux-x64
    - name: Bundle yt-dlp and set permissions
      run: |
        mkdir -p ./publish/linux-x64/bin
        mv yt-dlp-bin ./publish/linux-x64/bin/yt-dlp
        chmod +x ./publish/linux-x64/bin/yt-dlp
        chmod +x ./publish/linux-x64/realsnag-media-downloader
    - uses: actions/upload-artifact@v4
      with:
        name: publish-linux-x64
        path: ./publish/linux-x64

  build-macos-x64:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.x'
    - run: dotnet restore
    - name: Download yt-dlp
      run: |
        curl -sL $(curl -s https://api.github.com/repos/yt-dlp/yt-dlp/releases/latest | grep -o 'https://[^"]*yt-dlp_macos"' | tr -d '"') -o yt-dlp-bin
        chmod +x yt-dlp-bin
    - run: dotnet publish -c Release -r osx-x64 --self-contained true -p:PublishSingleFile=false -o ./publish/osx-x64
    - name: Bundle yt-dlp and set permissions
      run: |
        mkdir -p ./publish/osx-x64/bin
        mv yt-dlp-bin ./publish/osx-x64/bin/yt-dlp
        chmod +x ./publish/osx-x64/bin/yt-dlp
        chmod +x ./publish/osx-x64/realsnag-media-downloader
    - uses: actions/upload-artifact@v4
      with:
        name: publish-osx-x64
        path: ./publish/osx-x64

  build-macos-arm64:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.x'
    - run: dotnet restore
    - name: Download yt-dlp
      run: |
        curl -sL $(curl -s https://api.github.com/repos/yt-dlp/yt-dlp/releases/latest | grep -o 'https://[^"]*yt-dlp_macos"' | tr -d '"') -o yt-dlp-bin
        chmod +x yt-dlp-bin
    - run: dotnet publish -c Release -r osx-arm64 --self-contained true -p:PublishSingleFile=false -o ./publish/osx-arm64
    - name: Bundle yt-dlp and set permissions
      run: |
        mkdir -p ./publish/osx-arm64/bin
        mv yt-dlp-bin ./publish/osx-arm64/bin/yt-dlp
        chmod +x ./publish/osx-arm64/bin/yt-dlp
        chmod +x ./publish/osx-arm64/realsnag-media-downloader
    - uses: actions/upload-artifact@v4
      with:
        name: publish-osx-arm64
        path: ./publish/osx-arm64

  release:
    needs: [build-win, build-linux, build-macos-x64, build-macos-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - name: Download win-x64
      uses: actions/download-artifact@v4
      with:
        name: publish-win-x64
        path: ./publish/win-x64
    - name: Download linux-x64
      uses: actions/download-artifact@v4
      with:
        name: publish-linux-x64
        path: ./publish/linux-x64
    - name: Download osx-x64
      uses: actions/download-artifact@v4
      with:
        name: publish-osx-x64
        path: ./publish/osx-x64
    - name: Download osx-arm64
      uses: actions/download-artifact@v4
      with:
        name: publish-osx-arm64
        path: ./publish/osx-arm64
    - name: Create zip archives
      run: |
        cd ./publish
        zip -r win-x64.zip win-x64
        zip -r linux-x64.zip linux-x64
        zip -r osx-x64.zip osx-x64
        zip -r osx-arm64.zip osx-arm64
    - name: Get version
      id: version
      run: echo "VERSION=$(grep -E '<Version>' realsnag-media-downloader.csproj | sed 's/.*<Version>\(.*\)<\/Version>.*/\1/')" >> $GITHUB_OUTPUT
    - name: Create Release
      uses: softprops/action-gh-release@v2.1.0
      with:
        tag_name: v${{ steps.version.outputs.VERSION }}
        name: v${{ steps.version.outputs.VERSION }}
        draft: false
        prerelease: false
        files: |
          ./publish/win-x64.zip
          ./publish/linux-x64.zip
          ./publish/osx-x64.zip
          ./publish/osx-arm64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
